<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerenciar Formulario de Saude</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🩺 Formulário de Saúde</h1>
  <p class="subtitle">Sistema de gerenciamento</p>

  <div class="menu">

    <div class="card">
      <h3>Preencher formulário</h3>

      <input id="cpfFormulario" placeholder="CPF do paciente"><br><br>
      <input id="alergiaFormulario" placeholder="Alergia(s)"><br><br>
      <input id="doencasFormulario" placeholder="Doença(s)"><br><br>
      <input id="medicamentoFormulario" placeholder="Medicamento(s)"><br><br>

      <button onclick="salvarOuAtualizarFormulario()">Salvar / Atualizar</button>
    </div>

    <div class="card">
      <h3>Buscar formulário</h3>

      <input id="cpfBuscarFormulario" placeholder="Digite o CPF"><br><br>
      <button onclick="buscarFormularioPorCpf()">Buscar</button>

      <pre id="resultadoBuscaFormulario"></pre>
    </div>

    <div class="card">
      <h3>Listar formulários</h3>

      <button onclick="listarFormularios()">Listar formulários</button>
      <ul id="listaFormularios"></ul>
    </div>

  </div>
</div>

<script src="formularioSaude.js?v=2"></script>
</body>
</html>
