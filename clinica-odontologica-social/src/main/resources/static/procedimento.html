<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gerenciar Procedimentos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
  <h1>🦷 Procedimentos</h1>
  <p class="subtitle">Sistema de gerenciamento</p>

  <div class="menu">

    <div class="card">
      <h3>Solicitar procedimento</h3>
      <button onclick="toggleProcedimentos()">Abrir menu</button>

      <div id="menuProcedimentos" style="display:none; margin-top:15px;">
        <button onclick="selecionarTipo('Cirurgico')">Cirúrgico</button>
        <button onclick="selecionarTipo('Estetico')">Estético</button>
        <button onclick="selecionarTipo('Rotina')">Rotina</button>
      </div>

      <div id="formDinamico" style="display:none; margin-top:15px;">
        <h3 id="tituloDinamico"></h3>

        <input id="idConsulta" type="number" placeholder="ID da consulta"><br><br>
        <input id="cpfFormulario" placeholder="CPF do paciente"><br><br>
        <input id="alergiaFormulario" placeholder="Alergia(s)"><br><br>
        <input id="doencasFormulario" placeholder="Doença(s)"><br><br>
        <input id="medicamentoFormulario" placeholder="Medicamento(s)"><br><br>

        <button onclick="salvarOuAtualizarFormulario()">Salvar / Atualizar</button>
      </div>
    </div>

    <div class="card">
      <h3>Lista de Procedimentos</h3>
      <button onclick="listarProcedimentos()">Listar procedimentos</button>
      <ul id="listaProcedimentos"></ul>
    </div>

    <div class="card">
      <h3>Atualizar Procedimento</h3>
      <button onclick="atualizarProcedimento()">Atualizar por ID</button>
    </div>

    <div class="card">
      <h3>Deletar Procedimento</h3>
      <button onclick="deletarProcedimento()">Deletar por ID</button>
    </div>

    <div class="card">
      <h3>Buscar por Consulta</h3>
      <button onclick="buscarPorConsulta()">Buscar</button>
    </div>

    <div class="card">
      <h3>Buscar por ID</h3>
      <button onclick="buscarPorId()">Buscar</button>
    </div>

    <div class="card">
      <h3>Buscar formulário</h3>

      <input id="cpfBuscarFormulario" placeholder="CPF"><br><br>
      <button onclick="buscarFormularioPorCpf()">Buscar</button>

      <pre id="resultadoBuscaFormulario"></pre>
    </div>

    <div class="card">
      <h3>Listar formulários</h3>
      <button onclick="listarFormularios()">Listar</button>
      <ul id="listaFormularios"></ul>
    </div>

  </div>
</div>

<script src="procedimento.js"></script>
</body>
</html>
